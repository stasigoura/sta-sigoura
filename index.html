<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ΣΤΑ ΣΙΓΟΥΡΑ</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

.container {
  width:90%;
  max-width:1100px;
  margin:auto;
}

/* HERO */
.hero {
  height:90vh;
  display:flex;
  align-items:center;
  background:url('https://images.unsplash.com/photo-1505693416388-ac5ce068fe85') center/cover;
}

.hero-content {
  background:rgba(0,0,0,0.6);
  padding:40px;
  border-radius:10px;
}

.hero h1 {
  font-size:50px;
}

.btn {
  display:inline-block;
  padding:15px 25px;
  background:gold;
  color:black;
  margin-top:20px;
  text-decoration:none;
  font-weight:bold;
}

/* SECTION */
.section {
  padding:80px 0;
}

/* BEFORE AFTER */
.ba {
  position:relative;
  overflow:hidden;
}

.ba img {
  width:100%;
  display:block;
}

.after {
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}

.slider {
  position:absolute;
  bottom:20px;
  width:100%;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="container hero-content">
    <h1>Ανακαίνισε το ακίνητό σου ΣΤΑ ΣΙΓΟΥΡΑ</h1>
    <p>
      Χωρίς άγχος, χωρίς μπλέξιμο, χωρίς 10 διαφορετικούς μάστορες.  
      Μία επαφή. Καθαρό πλάνο. Σοβαρό αποτέλεσμα.
    </p>
    <a class="btn" href="#">Ζήτησε προσφορά</a>
  </div>
</section>

<!-- TRUST -->
<section class="section container">
  <h2>Γιατί να μας εμπιστευτείς</h2>
  <p>
    Δεν αναλαμβάνουμε απλά εργασίες.  
    Αναλαμβάνουμε την ευθύνη να γίνει σωστά.
  </p>
</section>

<!-- BEFORE AFTER 1 -->
<section class="section container">
  <h2>Πριν & Μετά</h2>

  <div class="ba">
    <img src="https://images.unsplash.com/photo-1484154218962-a197022b5858">
    <div class="after">
      <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85">
    </div>
    <input type="range" min="0" max="100" value="50" class="slider">
  </div>

</section>

<!-- BEFORE AFTER 2 -->
<section class="section container">

  <div class="ba">
    <img src="https://images.unsplash.com/photo-1556911220-bff31c812dba">
    <div class="after">
      <img src="https://images.unsplash.com/photo-1484154218962-a197022b5858">
    </div>
    <input type="range" min="0" max="100" value="50" class="slider">
  </div>

</section>

<script>
document.querySelectorAll(".slider").forEach(slider => {
  slider.addEventListener("input", function() {
    this.previousElementSibling.style.width = this.value + "%";
  });
});
</script>

</body>
</html>
